name: CI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.detect.outputs.rust }}
      nomad: ${{ steps.detect.outputs.nomad }}
      pulumi: ${{ steps.detect.outputs.pulumi }}
      nomad_files: ${{ steps.detect.outputs.nomad_files }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed areas
        id: detect
        run: ./.github/scripts/detect_changes.sh

  verify:
    name: verify
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-core-ubuntu-stable-v1
          cache-all-crates: "false"
          cache-bin: "false"
          cache-workspace-crates: "false"

      - name: Run core verification profile
        run: cargo xtask verify profile core

      - name: Infrastructure posture validation
        run: |
          if rg -n 'driver\s*=\s*"raw_exec"' infrastructure/nomad/jobs; then
            echo "raw_exec deployments are not allowed for workload services"
            exit 1
          fi

  nomad:
    name: nomad
    needs: changes
    if: needs.changes.outputs.nomad == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate changed Nomad jobs
        env:
          NOMAD_FILES: ${{ needs.changes.outputs.nomad_files }}
        run: |
          mapfile -t files <<< "${NOMAD_FILES}"
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No Nomad jobs changed."
            exit 0
          fi
          for file in "${files[@]}"; do
            [[ -z "${file}" ]] && continue
            docker run --rm -v "${PWD}:/workspace" -w /workspace hashicorp/nomad:1.8.4 \
              nomad job validate "${file}"
          done

  pulumi:
    name: pulumi
    needs: changes
    if: needs.changes.outputs.pulumi == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure/pulumi
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: infrastructure/pulumi/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Pulumi workspace tests
        run: npm test
