name: CI

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pr-gate:
    name: pr-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup build environment
        uses: ./.github/actions/setup-build-environment
        with:
          rust-components: rustfmt,clippy
          node-version-file: .nvmrc
          node-cache-path: |
            ui/e2e/package-lock.json
            infrastructure/pulumi/package-lock.json

      - name: Run repo-owned CI validation
        shell: bash
        run: |
          command=(cargo xtask validate ci --event "${GITHUB_EVENT_NAME}")

          case "${GITHUB_EVENT_NAME}" in
            pull_request)
              command+=(--base "${{ github.event.pull_request.base.sha }}" --head "${{ github.event.pull_request.head.sha }}")
              ;;
            push)
              command+=(--base "${{ github.event.before }}" --head "${{ github.sha }}")
              ;;
          esac

          "${command[@]}"

      - name: Publish validation summary
        if: always()
        shell: bash
        run: |
          if [[ -f target/validation/ci.md ]]; then
            cat target/validation/ci.md >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "No CI validation report was produced." >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports-ci
          path: target/validation
          if-no-files-found: ignore
