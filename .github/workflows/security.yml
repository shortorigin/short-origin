name: Security

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4

  cargo-audit:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      CARGO_AUDIT_VERSION: 0.22.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-core-ubuntu-stable-v1
          cache-all-crates: "false"
          cache-bin: "false"
          cache-workspace-crates: "false"

      - name: Cache cargo-audit
        id: cargo-audit-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit-${{ env.CARGO_AUDIT_VERSION }}

      - name: Install cargo-audit
        if: steps.cargo-audit-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked --version "${CARGO_AUDIT_VERSION}"

      - name: Run cargo audit
        run: cargo audit
