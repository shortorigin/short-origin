name: Security

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-gate:
    name: security-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-build-environment

      - name: Run repo-owned security validation
        run: cargo xtask validate suite security

      - name: Publish security summary
        if: always()
        shell: bash
        run: |
          if [[ -f target/validation/security.md ]]; then
            cat target/validation/security.md >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "No security validation report was produced." >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports-security
          path: target/validation
          if-no-files-found: ignore
