version = 1

[organization]
login = "shortorigin"
governance_repository = ".github"
governance_repository_description = "Canonical Origin GitHub governance, issue forms, pull request templates, and community health files."

[repository_defaults]
default_branch = "main"
branch_name_pattern = "^(feature|fix|infra|docs|refactor|research)/[0-9]+-[a-z0-9-]+$"
pr_title_pattern = "^(build|chore|ci|docs|feat|fix|perf|refactor|revert|test)\\([a-z0-9][a-z0-9_-]*\\): [a-z0-9].+$"
# `xtask github sync repo` applies these checks with strict status enforcement so PR heads
# must be current with the target branch before merge.
required_status_checks = ["Governance / governance-gate", "CI / pr-gate", "Security / security-gate"]
# `main` requires one approval and code owner review. Stacked PRs should target their
# parent branch until the base PR merges instead of pointing multiple layers at `main`.
required_approving_review_count = 1
dismiss_stale_reviews_on_push = true
require_code_owner_review = true
required_review_thread_resolution = true
# Keep one merge path on `main`; merge queue must remain enabled in GitHub UI and should be the
# default merge path after local-first validation succeeds.
allow_auto_merge = true
allow_squash_merge = true
allow_merge_commit = false
allow_rebase_merge = false
delete_branch_on_merge = true

[execution_artifacts]
root = "plans"
task_contract_filename = "task-contract.json"
exec_plan_filename = "EXEC_PLAN.md"
require_for_multi_plane = true
require_for_risk_classes = ["high"]
recommend_for_risk_classes = ["medium"]

[project]
title = "Engineering Flow"
short_description = "Organization-wide GitHub-native Scrumban board for issue-driven delivery and release milestones."
status_field_name = "Status"
status_options = ["Backlog", "Ready", "In Progress", "PR Open", "Review", "Done"]
repository_views = ["origin"]
milestone_views = ["v0.1 - MVP", "v0.2 - Core Platform", "v0.3 - Beta", "v1.0 - Production"]

[[repositories]]
name = "origin"
link_to_project = true

[[labels]]
name = "type:feature"
color = "0E8A16"
description = "New feature delivery."

[[labels]]
name = "type:bug"
color = "D73A4A"
description = "Defect or regression."

[[labels]]
name = "type:refactor"
color = "5319E7"
description = "Internal design or structure improvement."

[[labels]]
name = "type:docs"
color = "0075CA"
description = "Documentation work."

[[labels]]
name = "type:infra"
color = "0052CC"
description = "Infrastructure, CI/CD, or platform configuration."

[[labels]]
name = "type:research"
color = "FBCA04"
description = "Investigation, spike, or discovery work."

[[labels]]
name = "priority:low"
color = "C2E0C6"
description = "Low urgency."

[[labels]]
name = "priority:medium"
color = "FBCA04"
description = "Default delivery priority."

[[labels]]
name = "priority:high"
color = "D93F0B"
description = "High urgency and near-term delivery."

[[labels]]
name = "priority:critical"
color = "B60205"
description = "Production-impacting or blocking work."

[[milestones]]
title = "v0.1 - MVP"
description = "Minimum viable platform release."

[[milestones]]
title = "v0.2 - Core Platform"
description = "Core platform capabilities and reusable runtime surfaces."

[[milestones]]
title = "v0.3 - Beta"
description = "Beta stabilization and external-user readiness."

[[milestones]]
title = "v1.0 - Production"
description = "Production release with governed delivery workflows."
