name: Infrastructure
description: Propose CI/CD, deployment, hosting, or environment changes.
title: "[Infra]: "
labels:
  - type:infra
  - priority:medium
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the infrastructure change.
      placeholder: Add a short description of the infrastructure request.
    validations:
      required: true
  - type: textarea
    id: problem_statement
    attributes:
      label: Problem Statement
      description: Describe the operational gap, reliability issue, or delivery need.
    validations:
      required: true
  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed Solution
      description: Describe the intended environment, CI/CD, or platform change.
    validations:
      required: true
  - type: dropdown
    id: primary_architectural_plane
    attributes:
      label: Primary Architectural Plane
      description: Select the dominant repository plane for this work.
      options:
        - enterprise
        - schemas
        - shared
        - platform
        - services
        - workflows
        - ui
        - infrastructure
        - agents
        - testing
        - docs
        - cross-layer
    validations:
      required: true
  - type: textarea
    id: adr_references
    attributes:
      label: ADR References
      description: List the ADR IDs that govern this infrastructure work or write `None`.
      placeholder: "- ADR-0015"
    validations:
      required: true
  - type: textarea
    id: impacted_domains
    attributes:
      label: Impacted Domains
      description: List the domains or bounded contexts affected by the infrastructure change.
      placeholder: "- [ ] Domain or bounded context"
    validations:
      required: true
  - type: dropdown
    id: affected_consistency_class
    attributes:
      label: Affected Consistency Class
      description: Select the strongest applicable consistency class.
      options:
        - Class A
        - Class B
        - Class C
        - Not Applicable
    validations:
      required: true
  - type: dropdown
    id: affected_risk_tier
    attributes:
      label: Affected Risk Tier
      description: Select the applicable delivery or runtime risk tier.
      options:
        - low
        - medium
        - high
        - not applicable
    validations:
      required: true
  - type: textarea
    id: scope_in
    attributes:
      label: Scope In
      description: List what is explicitly in scope for this issue.
      placeholder: "- [ ] In-scope item"
    validations:
      required: true
  - type: textarea
    id: scope_out
    attributes:
      label: Scope Out
      description: List what is explicitly out of scope for this issue.
      placeholder: "- [ ] Out-of-scope item"
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: List the observable conditions that must hold after rollout.
      placeholder: "- [ ] Criterion 1"
    validations:
      required: true
  - type: textarea
    id: validation_requirements
    attributes:
      label: Validation Requirements
      description: List the commands, tests, or deployment checks required before merge.
      placeholder: "- [ ] Validation step"
    validations:
      required: true
  - type: textarea
    id: validation_artifacts
    attributes:
      label: Validation Artifacts
      description: List the commands, plans, or review evidence expected for completion.
      placeholder: "- [ ] Evidence artifact"
    validations:
      required: true
  - type: textarea
    id: rollback_considerations
    attributes:
      label: Rollback Considerations
      description: Describe rollback expectations or state that rollback is not applicable.
      placeholder: "Describe rollback or write `Not applicable`."
    validations:
      required: true
  - type: textarea
    id: rollback_path
    attributes:
      label: Rollback Path
      description: Describe the concrete rollback sequence or state that rollback is not applicable.
      placeholder: "Describe the rollback path or write `Not applicable`."
    validations:
      required: true
  - type: textarea
    id: technical_notes
    attributes:
      label: Technical Notes
      description: Capture rollout steps, rollback plans, secrets, provider dependencies, or runtime constraints.
  - type: textarea
    id: related_issues
    attributes:
      label: Related Issues
      description: Link or reference related incidents, issues, or pull requests.
