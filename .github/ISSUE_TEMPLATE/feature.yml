name: Feature
description: Propose a new capability or additive product increment.
title: "[Feature]: "
labels:
  - type:feature
  - priority:medium
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the requested outcome.
      placeholder: Add a short description of the feature.
    validations:
      required: true
  - type: textarea
    id: problem_statement
    attributes:
      label: Problem Statement
      description: Describe the user or operational problem this issue addresses.
    validations:
      required: true
  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed Solution
      description: Describe the expected implementation direction or intended behavior.
    validations:
      required: true
  - type: dropdown
    id: primary_architectural_plane
    attributes:
      label: Primary Architectural Plane
      description: Select the dominant repository plane for this work.
      options:
        - enterprise
        - schemas
        - shared
        - platform
        - services
        - workflows
        - ui
        - infrastructure
        - agents
        - testing
        - docs
        - cross-layer
    validations:
      required: true
  - type: textarea
    id: scope_in
    attributes:
      label: Scope In
      description: List what is explicitly in scope for this issue.
      placeholder: "- [ ] In-scope item"
    validations:
      required: true
  - type: textarea
    id: scope_out
    attributes:
      label: Scope Out
      description: List what is explicitly out of scope for this issue.
      placeholder: "- [ ] Out-of-scope item"
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: List the concrete behaviors that must be true before the issue is done.
      placeholder: "- [ ] Criterion 1"
    validations:
      required: true
  - type: textarea
    id: validation_requirements
    attributes:
      label: Validation Requirements
      description: List the commands, tests, or review evidence required before merge.
      placeholder: "- [ ] Validation step"
    validations:
      required: true
  - type: textarea
    id: rollback_considerations
    attributes:
      label: Rollback Considerations
      description: Describe rollback expectations or state that rollback is not applicable.
      placeholder: "Describe rollback or write `Not applicable`."
    validations:
      required: true
  - type: textarea
    id: technical_notes
    attributes:
      label: Technical Notes
      description: Capture contract, workflow, migration, or dependency considerations.
  - type: textarea
    id: related_issues
    attributes:
      label: Related Issues
      description: Link or reference related issues, milestones, or pull requests.
