name: Refactor
description: Propose an internal design improvement without changing intended behavior.
title: "[Refactor]: "
labels:
  - type:refactor
  - priority:medium
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the refactor objective.
      placeholder: Add a short description of the refactor.
    validations:
      required: true
  - type: textarea
    id: problem_statement
    attributes:
      label: Problem Statement
      description: Describe the design problem, maintenance risk, or technical debt.
    validations:
      required: true
  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed Solution
      description: Describe the intended refactor boundary and behavior-preservation strategy.
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: List the verification points that must remain true after the refactor.
      placeholder: "- [ ] Criterion 1"
    validations:
      required: true
  - type: textarea
    id: technical_notes
    attributes:
      label: Technical Notes
      description: Capture contract compatibility, migration notes, or expected follow-up work.
  - type: textarea
    id: related_issues
    attributes:
      label: Related Issues
      description: Link or reference related issues, ADRs, or pull requests.
