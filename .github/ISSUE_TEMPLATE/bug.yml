name: Bug
description: Report a defect, behavioral regression, or incorrect system outcome.
title: "[Bug]: "
labels:
  - type:bug
  - priority:high
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the bug.
      placeholder: Add a short description of the defect.
    validations:
      required: true
  - type: textarea
    id: problem_statement
    attributes:
      label: Problem Statement
      description: Describe the incorrect behavior, impact, and current failure mode.
    validations:
      required: true
  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed Solution
      description: Describe the expected fix or mitigation approach.
    validations:
      required: true
  - type: dropdown
    id: primary_architectural_plane
    attributes:
      label: Primary Architectural Plane
      description: Select the dominant repository plane for this work.
      options:
        - enterprise
        - schemas
        - shared
        - platform
        - services
        - workflows
        - ui
        - infrastructure
        - agents
        - testing
        - docs
        - cross-layer
    validations:
      required: true
  - type: textarea
    id: scope_in
    attributes:
      label: Scope In
      description: List what is explicitly in scope for this issue.
      placeholder: "- [ ] In-scope item"
    validations:
      required: true
  - type: textarea
    id: scope_out
    attributes:
      label: Scope Out
      description: List what is explicitly out of scope for this issue.
      placeholder: "- [ ] Out-of-scope item"
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: List the concrete checks that will prove the bug is fixed.
      placeholder: "- [ ] Criterion 1"
    validations:
      required: true
  - type: textarea
    id: validation_requirements
    attributes:
      label: Validation Requirements
      description: List the commands, tests, or review evidence required before merge.
      placeholder: "- [ ] Validation step"
    validations:
      required: true
  - type: textarea
    id: rollback_considerations
    attributes:
      label: Rollback Considerations
      description: Describe rollback expectations or state that rollback is not applicable.
      placeholder: "Describe rollback or write `Not applicable`."
    validations:
      required: true
  - type: textarea
    id: technical_notes
    attributes:
      label: Technical Notes
      description: Capture logs, failing tests, affected contracts, or rollback considerations.
  - type: textarea
    id: related_issues
    attributes:
      label: Related Issues
      description: Link or reference related incidents, issues, or pull requests.
