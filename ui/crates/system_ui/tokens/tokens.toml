[color]
canvas = "#071019"
desktop = "#0d1827"
surface = "#132133"
surface-muted = "#19283a"
surface-elevated = "#223247"
surface-inset = "#0d1725"
surface-overlay = "rgba(7, 16, 25, 0.88)"
surface-interactive = "#1c2d41"
surface-hover = "#26405d"
surface-pressed = "#13263c"
surface-selected = "rgba(101, 181, 255, 0.22)"
border-subtle = "rgba(160, 183, 207, 0.18)"
border-strong = "rgba(180, 198, 220, 0.34)"
border-focus = "#98d0ff"
border-selected = "rgba(101, 181, 255, 0.62)"
text-primary = "#eef5ff"
text-secondary = "#b5c6d9"
text-muted = "#8092a6"
text-inverse = "#06111b"
accent = "#65b5ff"
accent-strong = "#9cd7ff"
focus = "#98d0ff"
success = "#52c89f"
warning = "#f1bd67"
danger = "#ef8787"
selection = "rgba(101, 181, 255, 0.24)"

[spacing]
0 = "0"
1q = "2px"
1 = "4px"
2 = "8px"
3 = "12px"
4 = "16px"
