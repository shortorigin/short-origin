medium = "500"
semibold = "600"
bold = "700"

[typography.line_height]
tight = "1.1"
body = "1.5"
heading = "1.2"
relaxed = "1.6"

[typography.letter_spacing]
tight = "-0.02em"
normal = "0"
wide = "0.02em"
caps = "0.08em"

[radius]
none = "0"
sm = "10px"
md = "14px"
lg = "20px"
xl = "24px"
round = "999px"

[shadow]
