window = "0 28px 72px rgba(0, 0, 0, 0.36)"
overlay = "0 32px 92px rgba(0, 0, 0, 0.42)"
inset = "inset 0 1px 0 rgba(255, 255, 255, 0.05)"
pressed = "inset 0 2px 6px rgba(0, 0, 0, 0.26)"
