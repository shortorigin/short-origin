[package]
name = "system_ui"
version = "0.1.0"
edition = "2021"
build = "build.rs"

[features]
default = ["csr"]
csr = ["leptos/csr"]

[dependencies]
leptos = { version = "0.6", default-features = false }
serde = { version = "1", features = ["derive"] }

[build-dependencies]
serde = { version = "1", features = ["derive"] }
toml = "0.8"

[dev-dependencies]
trybuild = "1"
