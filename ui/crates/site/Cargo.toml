[package]
name = "site"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["rlib", "cdylib"]

[[bin]]
name = "site_app"
path = "src/main.rs"
test = false

[features]
default = ["csr"]
csr = ["desktop_runtime/csr", "leptos/csr", "leptos_meta/csr", "leptos_router/csr"]
desktop-tauri = ["desktop_runtime/desktop-tauri", "platform_host_web/desktop-host-tauri"]

[dependencies]
desktop_app_contract = { path = "../desktop_app_contract" }
desktop_runtime = { path = "../desktop_runtime", default-features = false }
leptos = { workspace = true, default-features = false }
leptos_meta = { workspace = true, default-features = false }
leptos_router = { workspace = true, default-features = false }
platform_host_web = { path = "../platform_host_web", default-features = false }
js-sys.workspace = true
wasm-bindgen.workspace = true
wasm-bindgen-futures.workspace = true
web-sys = { workspace = true, features = ["BroadcastChannel", "Document", "Location", "MessageEvent", "Navigator", "ServiceWorkerContainer", "Url", "Window"] }
console_error_panic_hook.workspace = true
