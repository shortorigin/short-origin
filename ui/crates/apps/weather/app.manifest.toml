schema_version = 1
plugin_id = "intelligence.weather"
app_id = "intelligence.weather"
display_name = "Weather"
version = "0.1.0"
platform_contract_version = "1.0.0"
runtime_contract_version = "2.0.0"
requested_capabilities = ["window", "state", "config", "theme"]
required_platform_contracts = [
  "schemas/contracts/v1/plugin-module-v1.json",
  "platform/sdk/v1/weather"
]
service_dependencies = [
  "schemas/contracts/v1/weather-view-v1.json",
  "schemas/contracts/v1/weather-feature-slice-v1.json",
  "schemas/contracts/v1/weather-alert-feed-v1.json",
  "schemas/contracts/v1/weather-map-scene-v1.json"
]
workflow_dependencies = []
host_requirements = ["browser-storage:required"]
runtime_targets = ["pwa", "tauri"]
permissions = ["shell.mount", "shell.window", "shell.theme"]
single_instance = true
suspend_policy = "on-minimize"

[ui]
entry = "desktop_app_weather"
routes = ["/apps/weather"]

[launcher]
show_in_launcher = true
show_on_desktop = true

[window_defaults]
width = 1080
height = 720
