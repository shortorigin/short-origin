[package]
name = "desktop_tauri"
edition.workspace = true
license.workspace = true
publish.workspace = true
version.workspace = true
description = "Tauri desktop shell host for the Origin OS Leptos runtime."

[[bin]]
name = "desktop_tauri"
path = "src/main.rs"
test = false

[build-dependencies]
tauri-build = { workspace = true, default-features = false, features = ["config-json"] }

[dependencies]
platform_host = { path = "../platform_host" }
serde_json.workspace = true
tauri = { workspace = true, default-features = false, features = ["common-controls-v6", "compression", "dynamic-acl", "wry", "x11"] }
tauri-plugin-notification.workspace = true
tauri-plugin-opener.workspace = true
telemetry = { path = "../../../shared/telemetry", features = ["native-tracing"] }
tokio.workspace = true
tracing.workspace = true
